host: localhost:8080
info:
  contact: {}
  description: 与 TeslaMate 采集数据对齐的 JSON API；看板对照见仓库 `执行计划.md`。
  license:
    name: MIT
  title: TeslaMate API
  version: "1.0"
paths:
  /:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespHTTPRoot'
      summary: 根路径（服务运行提示）
      tags:
      - system
  /api:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespHTTPRoot'
      summary: /api 根路径
      tags:
      - system
  /api/healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespHealthz'
      summary: 存活探针
      tags:
      - system
  /api/ping:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespPing'
      summary: Ping
      tags:
      - system
  /api/readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespReadyz'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/main.RespAPIError'
      summary: 就绪探针
      tags:
      - system
  /api/v1:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespHTTPRoot'
      summary: API v1 根路径
      tags:
      - system
  /api/v1/cars:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.RespCarsList'
      summary: 车辆列表或详情
      tags:
      - cars
  /api/v1/cars/{CarID}:
